<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="/style/processAdoption.css">
</head>
<body>
    <section class="adocao">
        <h2>Formulário de Adoção</h2>

        <form class="formAdocao">
            <label>Nome completo</label>
            <input type="text" placeholder="Digite seu nome">

            <label>E-mail</label>
            <input type="email" placeholder="Digite seu e-mail">

            <label>Telefone</label>
            <input type="tel" placeholder="(99)99999-9999">

            <label>Idade</label>
            <input type="number">

            <label>Por que deseja adotar?</label>
            <textarea placeholder="Conte um pouco..."></textarea>
        </form>

        <form class="formAdocao">
            <label>Você mora em:</label>
            <select>
                <option>Casa</option>
                <option>Apartamento</option>
                <option>Condominio</option>
            </select>

            <label>Possui outros animais?</label>
            <select>
                <option>Sim</option>
                <option>Não</option>
            </select>
        </form>

        <button type="submit">ENVIAR</button>
    </section>
</body>
</html>
