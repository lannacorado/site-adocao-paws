<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="/style/forms.css">
</head>
<body>

    <section class="formAdocao">
        <h2>Formulário de Adoção</h2>

        <form class="Perguntas">
            <div class="campo">
                <label>Nome completo</label>
                <input type="text" placeholder="Digite seu nome">
            </div>

            <div class="campo">
                <label>Idade</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Data de Nascimento</label>
                <input type="date">
            </div>

            <div class="campo">
                <label>CPF</label>
                <input type="text">
            </div>            

            <div class="campo">
                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail">
            </div>

            <div class="campo">
                <label>Telefone</label>
                <input type="tel" placeholder="(99)99999-9999">
            </div>

            <div class="campo">
                <label>Endereço</label>
                <input type="text" placeholder="Rua, bairro, número">
            </div>

            <div class="campo">
                <label>Complemento</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Cidade</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Profissão</label>
                <input type="text">
            </div>

            <button type="submit">Enviar</button>
        </form>
    </section>

</body>
</html>
