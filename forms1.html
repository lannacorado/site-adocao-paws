<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style/forms.css">
    <link rel="stylesheet" href="style/accessibility.css">
    <script src="assets/js/accessibility.js" defer></script>
</head>
<body>
    <div class="accessibility-toggle-button">
        <button id="toggle-accessibility-toolbar" aria-pressed="true" aria-label="Ocultar controles de acessibilidade">Ocultar barra</button>
    </div>
    <div class="accessibility-toolbar" role="toolbar" aria-label="Controles de acessibilidade">
        <div class="accessibility-group">
            <span>Tema:</span>
            <button type="button" id="theme-default" aria-pressed="true">Padrão</button>
            <button type="button" id="theme-high-contrast" aria-pressed="false">Contraste alto</button>
            <button type="button" id="theme-grayscale" aria-pressed="false">Escala de cinza</button>
        </div>
        <div class="accessibility-group">
            <span>Tamanho do texto:</span>
            <button type="button" id="text-smaller" aria-pressed="false">Menor</button>
            <button type="button" id="text-normal" aria-pressed="true">Normal</button>
            <button type="button" id="text-larger" aria-pressed="false">Maior</button>
        </div>
        <div class="accessibility-group">
            <button type="button" id="text-spacing" aria-pressed="false">Espaçamento</button>
            <button type="button" id="accessibility-reset" aria-pressed="false">Redefinir</button>
        </div>
    </div>

    <section class="formAdocao">
        <h2>Formulário de Adoção</h2>

        <form class="Perguntas">
            <div class="campo">
                <label>Nome completo</label>
                <input type="text" placeholder="Digite seu nome">
            </div>

            <div class="campo">
                <label>Idade</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Data de Nascimento</label>
                <input type="date">
            </div>

            <div class="campo">
                <label>CPF</label>
                <input type="text">
            </div>            

            <div class="campo">
                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail">
            </div>

            <div class="campo">
                <label>Telefone</label>
                <input type="tel" placeholder="(99)99999-9999">
            </div>

            <div class="campo">
                <label>Endereço</label>
                <input type="text" placeholder="Rua, bairro, número">
            </div>

            <div class="campo">
                <label>Complemento</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Cidade</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Profissão</label>
                <input type="text">
            </div>
            <button type="submit">Enviar</button>
            <a href="adopt.html" class="buttonVoltar">Voltar</a>
        </form>
    </section>

</body>
</html>
